<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Career Compass AI - Trợ lý hướng nghiệp thông minh sử dụng trí tuệ nhân tạo Gemini để tư vấn nghề nghiệp, phỏng vấn thử và định hướng tương lai.">
    <meta name="keywords" content="Career Compass, AI Career Counselor, Hướng nghiệp AI, Gemini AI, Phỏng vấn xin việc, Tư vấn nghề nghiệp">
    <meta name="theme-color" content="#111827">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Career Compass AI - Định Hướng Tương Lai</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Buffer Polyfill (Required for Google GenAI SDK) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/buffer/6.0.3/buffer.min.js"></script>

    <!-- Tailwind Configuration -->
    <script>
      // Polyfill global and process for browser environment
      window.global = window;
      window.process = { env: {} };
      
      if (typeof window.Buffer === 'undefined' && typeof buffer !== 'undefined') { 
        window.Buffer = buffer.Buffer; 
      }
    </script>
    <style>
      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background-color: #f8fafc; 
        color: #0f172a; 
        transition: background-color 0.3s ease, color 0.3s ease; 
        overflow-x: hidden;
      }
      .dark body { background-color: #050505; color: #f8fafc; }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .dark ::-webkit-scrollbar-thumb { background: #333; }
      
      /* Utilities */
      .text-balance { text-wrap: balance; }
      
      /* Enhanced Glass Card */
      .glass-card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      .dark .glass-card {
        background: rgba(17, 25, 40, 0.6); /* Slightly blueish dark */
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      }
      
      .gradient-text {
        background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      
      .bento-grid {
        display: grid;
        grid-template-columns: repeat(1, minmax(0, 1fr));
        gap: 1.5rem;
      }
      @media (min-width: 768px) {
        .bento-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .col-span-2 { grid-column: span 2 / span 2; }
      }

      /* Markdown Styles */
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
        font-weight: 700;
        margin-top: 1em;
        margin-bottom: 0.5em;
        line-height: 1.2;
      }
      .markdown-body h1 { font-size: 1.5em; }
      .markdown-body h2 { font-size: 1.3em; }
      .markdown-body h3 { font-size: 1.1em; }
      .markdown-body p { margin-top: 0; margin-bottom: 0.5em; }
      .markdown-body ul, .markdown-body ol { margin-top: 0; margin-bottom: 0.5em; padding-left: 2em; }
      .markdown-body ul { list-style-type: disc; }
      .markdown-body ol { list-style-type: decimal; }
      .markdown-body li + li { margin-top: 0.25em; }
      .markdown-body strong { font-weight: 700; color: #4f46e5; }
      .dark .markdown-body strong { color: #818cf8; }
      .markdown-body em { font-style: italic; }
      .markdown-body code {
        padding: 0.2em 0.4em;
        margin: 0;
        font-size: 85%;
        background-color: rgba(175, 184, 193, 0.2);
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      }
      .dark .markdown-body code { background-color: rgba(110, 118, 129, 0.4); }
      .markdown-body pre {
        padding: 16px;
        overflow: auto;
        font-size: 85%;
        line-height: 1.45;
        background-color: #f6f8fa;
        border-radius: 6px;
        margin-bottom: 1em;
      }
      .dark .markdown-body pre { background-color: #161b22; }
      .markdown-body pre code {
        display: inline;
        max-width: auto;
        padding: 0;
        margin: 0;
        overflow: visible;
        line-height: inherit;
        word-wrap: normal;
        background-color: transparent;
        border: 0;
      }
      .markdown-body blockquote {
        padding: 0 1em;
        color: #656d76;
        border-left: 0.25em solid #d0d7de;
        margin: 0 0 1em 0;
      }
      .dark .markdown-body blockquote { color: #8b949e; border-left-color: #30363d; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
